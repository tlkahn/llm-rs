name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-cli-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build x86_64
        run: cargo build --release -p llm-cli --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release -p llm-cli --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/llm \
            target/aarch64-apple-darwin/release/llm \
            -output llm
          strip llm

      - name: Package
        run: |
          tar czf llm-${{ github.ref_name }}-macos-universal.tar.gz llm
          shasum -a 256 llm-${{ github.ref_name }}-macos-universal.tar.gz > llm-${{ github.ref_name }}-macos-universal.tar.gz.sha256

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            llm-*.tar.gz
            llm-*.tar.gz.sha256

  build-cli-linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p llm-cli --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          strip target/x86_64-unknown-linux-musl/release/llm
          tar czf llm-${{ github.ref_name }}-linux-x86_64-musl.tar.gz -C target/x86_64-unknown-linux-musl/release llm
          shasum -a 256 llm-${{ github.ref_name }}-linux-x86_64-musl.tar.gz > llm-${{ github.ref_name }}-linux-x86_64-musl.tar.gz.sha256

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            llm-*.tar.gz
            llm-*.tar.gz.sha256

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0

      - uses: Swatinem/rust-cache@v2

      - name: Build web target
        run: wasm-pack build crates/llm-wasm --target web --release --out-dir pkg-web

      - name: Build bundler target
        run: wasm-pack build crates/llm-wasm --target bundler --release --out-dir pkg-bundler

      - name: Package
        run: |
          tar czf llm-wasm-${{ github.ref_name }}-web.tar.gz -C crates/llm-wasm pkg-web
          tar czf llm-wasm-${{ github.ref_name }}-bundler.tar.gz -C crates/llm-wasm pkg-bundler
          shasum -a 256 llm-wasm-${{ github.ref_name }}-web.tar.gz > llm-wasm-${{ github.ref_name }}-web.tar.gz.sha256
          shasum -a 256 llm-wasm-${{ github.ref_name }}-bundler.tar.gz > llm-wasm-${{ github.ref_name }}-bundler.tar.gz.sha256

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            llm-wasm-*.tar.gz
            llm-wasm-*.tar.gz.sha256

  build-python-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            maturin-args: --release --out dist -m crates/llm-python/Cargo.toml
            manylinux: auto
          - os: macos-latest
            maturin-args: --release --out dist -m crates/llm-python/Cargo.toml --target universal2-apple-darwin
            manylinux: ''
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: ${{ matrix.maturin-args }}
          manylinux: ${{ matrix.manylinux || '' }}

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*.whl

  publish:
    runs-on: ubuntu-latest
    needs: [build-cli-macos, build-cli-linux-musl, build-wasm, build-python-wheels]
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit ${{ github.ref_name }} --draft=false
